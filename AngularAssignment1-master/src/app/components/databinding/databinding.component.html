<div>
    <h1>Interpolation</h1>
</div>

<div>
    <h3> Welcome, {{ firstname }} {{ lastname }} </h3> 
</div>

<div>
    <h1>Attribute Binding</h1>
</div>
<div>
    <table>
        <thead>
            <tr>
                <th [attr.colspan]="columnSpan">
                    {{pageHeader}}
                </th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>First Name</td>
                <td>{{FirstName}}</td>
            </tr>
            <tr>
                <td>Last Name</td>
                <td>{{LastName}}</td>
            </tr>
            <tr>
                <td>Branch</td>
                <td>{{Branch}}</td>
            </tr>
            <tr>
                <td>Mobile</td>
                <td>{{Mobile}}</td>
            </tr>
            <tr>
                <td>Gender</td>
                <td>{{Gender}}</td>
            </tr>
            <tr>
                <td>Age</td>
                <td>{{Age}}</td>
            </tr>
        </tbody>
      </table>
</div>

<div>
    <h1>Event Binding</h1>
</div>
<div>
    <input (keyup)="onKeyUp($event)">   
    <p>{{ name }}</p> 
</div>

<div>
    <h1>Two Way Data Binding</h1>
</div>
<div>
    <input [(ngModel)]="fullName" /> <br/><br/>    
    <h3> {{ fullName }} </h3>    
</div>
